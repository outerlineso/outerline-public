name: Feature request
description: Suggest an improvement or new capability for Outerline
title: "Feature: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Use this for product ideas, workflow improvements, and public roadmap discussion. Implementation planning remains in the private code repository.
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to accomplish?
      placeholder: Describe the workflow, friction, or missing capability.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would make this better?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried.
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - iOS
        - Both
        - Not platform-specific
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor
        - Library
        - Search
        - Tags and links
        - Export or sharing
        - Sync and storage
        - MCP or automation
        - Documentation
        - Other
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Examples, screenshots, or related issues.
    validations:
      required: false
